apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-migrate-role-controller
  namespace: opendatahub
rules:
# Database configuration secret migration (infrastructure namespace separation)
# Note: resourceNames cannot restrict 'create' (resource doesn't exist yet)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "get"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["maas-db-config"]
  verbs: ["delete"]
